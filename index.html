function validateIsraeliID(raw) {
  const id = String(raw).replace(/\D/g,"").padStart(9,"0");
  if (id.length !== 9) return false;
  let sum = 0;
  for (let i = 0; i < 9; i++) {
    let v = parseInt(id[i]) * ((i % 2) + 1);
    if (v > 9) v -= 9;
    sum += v;
  }
  return sum % 10 === 0;
}

function formatDateTime(d = new Date()) {
  return d.toLocaleDateString("he-IL", {
    day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit",
  });
}

function SigPad({ onConfirm, label="חתום/י כאן" }) {
  const ref = useRef(null);
  const [isDown, setIsDown]     = useState(false);
  const [hasLines, setHasLines] = useState(false);
  const [confirmed, setConfirmed] = useState(false);
  const last = useRef(null);

  const getXY = (e, canvas) => {
    const r = canvas.getBoundingClientRect();
    const sx = canvas.width/r.width, sy = canvas.height/r.height;
    const src = e.touches ? e.touches[0] : e;
    return { x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy };
  };
  const down = useCallback(e => {
    if (confirmed) return;
    e.preventDefault();
    last.current = getXY(e, ref.current);
    setIsDown(true);
  }, [confirmed]);
  const move = useCallback(e => {
    if (!isDown || confirmed) return;
    e.preventDefault();
    const c=ref.current, ctx=c.getContext("2d"), p=getXY(e,c);
    ctx.beginPath(); ctx.moveTo(last.current.x, last.current.y); ctx.lineTo(p.x, p.y);
    ctx.strokeStyle=C.navy; ctx.lineWidth=2.5; ctx.lineCap="round"; ctx.lineJoin="round"; ctx.stroke();
    last.current=p; setHasLines(true);
  }, [isDown, confirmed]);
  const up = useCallback(() => setIsDown(false), []);
  const clear = () => {
    ref.current.getContext("2d").clearRect(0,0,ref.current.width,ref.current.height);
    setHasLines(false); setConfirmed(false);
  };
  const confirm = () => { setConfirmed(true); onConfirm(ref.current.toDataURL("image/png")); };

  return (
    <div>
      {label && <p style={{ marginBottom:8, fontWeight:600, fontSize:14, color:C.navy }}>{label}</p>}
      <div style={{
        border: confirmed ? `2px solid ${C.green}` : `2px dashed ${C.gold}`,
        borderRadius:12, overflow:"hidden",
        background: confirmed ? "#F0FDF4" : C.cream,
        position:"relative", touchAction:"none",
      }}>
        <canvas ref={ref} width={640} height={180}
          style={{ width:"100%", display:"block", cursor:confirmed?"default":"crosshair" }}
          onMouseDown={down} onMouseMove={move} onMouseUp={up} onMouseLeave={up}
          onTouchStart={down} onTouchMove={move} onTouchEnd={up} />
        {!hasLines && !confirmed && (
          <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)",
            color:"#C0BAA8", fontSize:14, pointerEvents:"none", textAlign:"center" }}>
            <div style={{ fontSize:24, marginBottom:4 }}>✍️</div>{label}
          </div>
        )}
        {confirmed && (
          <div style={{ position:"absolute", top:8, left:8, background:C.green, color:"#fff",
            borderRadius:8, padding:"3px 10px", fontSize:12, fontWeight:600 }}>
            ✓ חתימה אושרה
          </div>
        )}
      </div>
      <div style={{ display:"flex", gap:8, marginTop:8, justifyContent:"flex-end" }}>
        {!confirmed ? (
          <>
            <button onClick={clear} style={S.btnOutline}>🗑 נקה</button>
            <button onClick={confirm} disabled={!hasLines} style={hasLines ? S.btnGold : S.btnOff}>
              אשר חתימה ✓
            </button>
          </>
        ) : (
          <button onClick={clear} style={{ ...S.btnOutline, fontSize:12 }}>✎ שנה חתימה</button>
        )}
      </div>
    </div>
  );
}

          </div>
          <div style={{background:"#FFFBEB",border:`1.5px solid ${C.gold}`,borderRadius:12,padding:18,marginBottom:20}}>
            <p style={{fontWeight:700,fontSize:15,color:C.navy,marginBottom:8}}>🏥 הצהרה רפואית</p>
            <p style={{fontSize:14,color:"#555",marginBottom:14,lineHeight:1.6}}>
              האם לילדך יש מצב רפואי, אלרגיה, תרופות קבועות או מגבלה פיזית שצוות הטיול צריך לדעת עליה?
            </p>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              {[["no","✅ לא, בריא/ה לחלוטין"],["yes","⚠️ כן, יש מידע חשוב"]].map(([v,lbl])=>(
                <button key={v} onClick={()=>setMedical(v)} style={{
                  flex:1, padding:"12px 14px", borderRadius:10, cursor:"pointer",
                  border: medical===v ? `2px solid ${C.gold}` : `2px solid ${C.border}`,
                  background: medical===v ? "#FEF3C7" : "#fff",
                  fontSize:14, fontWeight:medical===v?700:400, color:C.text,
                }}>{lbl}</button>
              ))}
            </div>
            {medical==="yes" && (
              <textarea style={{...S.input,minHeight:90,resize:"vertical"}}
                value={medDetails} onChange={e=>setMedDetails(e.target.value)}
                placeholder="פרט/י: שם התרופות, מינון, אלרגיות, מגבלות פיזיות..." />
            )}
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <button onClick={()=>setStep(2)} style={S.btnOutline}>→ חזור</button>
            <button onClick={()=>{sigDate.current=formatDateTime();setStep(4);}} disabled={!ok3} style={ok3?S.btnNavy:S.btnOff}>לחתימה ←</button>
          </div>
        </div>
      )}

      {step===4 && (
        <div>
          <h2 style={{color:C.navy,margin:"0 0 4px",fontSize:22}}>חתימה דיגיטלית</h2>
          <p style={{color:C.muted,marginBottom:4,fontSize:15}}>חתם/י בתיבה למטה לאישור המסמך</p>
          <p style={{fontSize:12,color:"#A0A0A0",marginBottom:20}}>
            תאריך החתימה נקלט אוטומטית: <strong style={{color:C.muted}}>{sigDate.current}</strong>
          </p>
          <div style={{...S.card,background:C.cream,border:"1px solid #EEE8D0"}}>
            <p style={{fontSize:14,color:"#444",marginBottom:16,lineHeight:1.7}}>
              אני, <strong>{parentName}</strong>, ת.ז. <strong>{parentId}</strong>,
              מאשר/ת בחתימתי את יציאת <strong>{selStudent?.firstName} {selStudent?.lastName}</strong> ל{CONFIG.TRIP_NAME} ומצהיר/ה כי קראתי את האישור במלואו.
            </p>
            <SigPad onConfirm={setSig} label="חתימת ההורה/אפוטרופוס" />
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
            <button onClick={()=>setStep(3)} style={S.btnOutline}>→ חזור</button>
            <button onClick={handleSubmit} disabled={!sig||submitting} style={sig&&!submitting?S.btnGold:S.btnOff}>
              {submitting ? "⏳ שולח..." : "🔐 שלח ואשר ←"}
            </button>
          </div>
        </div>
      )}

      {step===5 && (
        <div style={{textAlign:"center",padding:"16px 0"}}>
          <div style={{width:72,height:72,borderRadius:"50%",background:C.green,color:"#fff",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 16px"}}>✓</div>
          <h2 style={{color:C.navy,fontSize:24,marginBottom:8}}>האישור נחתם בהצלחה!</h2>
          <p style={{color:"#555",fontSize:15,lineHeight:1.8,marginBottom:20}}>
            חתימתך נשמרה. מייל נשלח לכתובת הארגונית של<br/>
            <strong>{selStudent?.firstName} {selStudent?.lastName}</strong>:
          </p>
          <code style={{background:"#F0F4FF",padding:"4px 14px",borderRadius:8,fontSize:14,color:C.navyMid}}>
            {selStudent?.email}
          </code>
          <p style={{color:C.muted,fontSize:14,marginTop:12}}>התלמיד/ה יתבקש/תתבקש לחתום על חלקו/ה באישור.</p>
          {confirmId && (
            <div style={{background:"#FFFBEB",border:`1px solid ${C.gold}`,borderRadius:12,padding:16,marginTop:20,display:"inline-block",textAlign:"right"}}>
              <p style={{margin:0,fontSize:13,color:"#92400E"}}>
                🔐 מספר אישור: <strong style={{fontFamily:"monospace"}}>{confirmId}</strong><br/>
                תאריך: <strong>{sigDate.current}</strong>
              </p>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function StudentFlow({ token }) {
  const [state, setState]     = useState("loading");
  const [data, setData]       = useState(null);
  const [sig, setSig]         = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [error, setError]     = useState("");
  const sigDate = useRef(formatDateTime());

  useEffect(() => {
    if (!token) { setState("invalid"); return; }
    fetch(`${CONFIG.WEBHOOK_URL}?action=getSigningData&token=${encodeURIComponent(token)}`)
      .then(r => r.json())
      .then(d => {
        if (d.error)           setState("invalid");
        else if (d.alreadySigned) setState("alreadySigned");
        else { setData(d); setState("ready"); }
      })
      .catch(() => setState("invalid"));
  }, [token]);

  const handleSubmit = async () => {
    setSubmitting(true); setError("");
    try {
      await fetch(CONFIG.WEBHOOK_URL, {
        method:"POST", headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({action:"studentSign",token,signature:sig,signedAt:sigDate.current}),
        mode:"no-cors"
      });
      setState("done");
    } catch { setError("שגיאת רשת — נסה שוב"); }
    setSubmitting(false);
  };

  if (state==="loading") return (
    <div style={{textAlign:"center",padding:60,color:C.muted}}>
      <div style={{fontSize:32,marginBottom:8}}>⏳</div>טוען אישור...
    </div>
  );
  if (state==="invalid") return (
    <div style={{textAlign:"center",padding:40}}>
      <div style={{fontSize:56,marginBottom:12}}>❌</div>
      <h3 style={{color:C.red}}>קישור לא תקין או פג תוקף</h3>
      <p style={{color:C.muted}}>הקישור תקף 72 שעות בלבד.<br/>פנה/י להורה לשליחת קישור חדש.</p>
    </div>
  );
  if (state==="alreadySigned") return (
    <div style={{textAlign:"center",padding:40}}>
      <div style={{width:64,height:64,borderRadius:"50%",background:C.green,color:"#fff",
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 12px"}}>✓</div>
      <h3 style={{color:C.green}}>כבר חתמת על מסמך זה</h3>
      <p style={{color:C.muted}}>אין צורך בפעולה נוספת. טיול נעים! 🎒</p>
    </div>
  );
  if (state==="done") return (
    <div style={{textAlign:"center",padding:40}}>
      <div style={{fontSize:64,marginBottom:8}}>🎒</div>
      <h2 style={{color:C.navy,fontSize:24}}>חתמת בהצלחה!</h2>
      <p style={{color:"#555",fontSize:15}}>כל האישורים הושלמו ונשמרו. טיול נעים ובטוח!</p>
    </div>
  );

  return (
    <div>
      <h2 style={{color:C.navy,margin:"0 0 4px",fontSize:22}}>חתימת תלמיד/ה על אישור יציאה</h2>
      <p style={{color:C.muted,marginBottom:20,fontSize:15}}>
        <strong>{data?.studentName}</strong> | כיתה {data?.studentClass} | {CONFIG.TRIP_NAME}
      </p>
      {error && <div style={S.errBox}>⚠️ {error}</div>}
      <div style={S.okBox}>
        <p style={{fontWeight:700,color:"#166534",marginBottom:10,fontSize:15}}>✅ הורה חתם על האישור</p>
        <p style={{fontSize:14,color:C.text,marginBottom:data?.parentSignature?10:0}}>
          <strong>{data?.parentName}</strong> | ת.ז.: {data?.parentId}<br/>
          <span style={{fontSize:12,color:C.muted}}>נחתם: {data?.parentSignedAt}</span>
        </p>
        {data?.parentSignature && (
          <div>
            <p style={{fontSize:12,color:C.muted,marginBottom:6}}>חתימת ההורה:</p>
            <img src={data.parentSignature} alt="חתימת הורה"
              style={{maxWidth:200,border:"1px solid #BBF7D0",borderRadius:8,background:"#fff",display:"block"}} />
          </div>
        )}
        {data?.hasMedical && (
          <div style={{marginTop:10,background:"#FEF9C3",borderRadius:8,padding:"6px 12px",
            fontSize:13,color:"#854D0E",border:"1px solid #FDE047"}}>
            ⚠️ נרשם מידע רפואי — מועבר לצוות המלווה
          </div>
        )}
      </div>
      <div style={{background:C.cream,border:"1px solid #E8E2CC",borderRadius:12,padding:18,marginBottom:20,
        fontSize:13,lineHeight:1.85,color:C.text,fontFamily:'"Frank Ruhl Libre",serif',maxHeight:200,overflowY:"auto"}}>
        <strong style={{fontFamily:"Heebo,sans-serif",fontSize:14}}>נוסח האישור:</strong>
        <div style={{marginTop:8,whiteSpace:"pre-line"}}>{PERMISSION_TEXT}</div>
      </div>
      <div style={{...S.card,background:C.cream,border:"1px solid #EEE8D0"}}>
        <p style={{fontWeight:700,color:C.navy,marginBottom:4,fontSize:15}}>✍️ חתימת התלמיד/ה</p>
        <p style={{fontSize:12,color:"#A0A0A0",marginBottom:14}}>תאריך: {sigDate.current}</p>
        <p style={{fontSize:14,color:"#444",marginBottom:16,lineHeight:1.7}}>
          אני, <strong>{data?.studentName}</strong>, מאשר/ת שקראתי את האישור לעיל ומסכים/מה לתנאיו.
        </p>
        <SigPad onConfirm={setSig} label="חתימת התלמיד/ה" />
      </div>
      <button onClick={handleSubmit} disabled={!sig||submitting}
        style={{...(sig&&!submitting?S.btnGold:S.btnOff),width:"100%"}}>
        {submitting ? "⏳ שולח..." : "🔐 אשר וחתום ←"}
      </button>
    </div>
  );
}

function App() {
  const [mode, setMode]   = useState("detect");
  const [token, setToken] = useState("");

  useEffect(() => {
    const h = window.location.hash;
    if (h.startsWith("#sign/")) {
      setToken(decodeURIComponent(h.slice(6)));
      setMode("student");
    } else {
      setMode("home");
    }
  }, []);

  if (mode==="detect") return null;

  return (
    <div style={{ minHeight:"100vh",
      background:`linear-gradient(160deg,#09132B 0%,${C.navyMid} 55%,#09132B 100%)`,
      padding:"24px 16px 48px" }}>

      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:10,
          background:"rgba(255,255,255,0.07)",backdropFilter:"blur(8px)",
          padding:"10px 22px",borderRadius:50,
          border:"1px solid rgba(201,168,76,0.35)",marginBottom:14}}>
          <span style={{fontSize:20}}>🎒</span>
          <span style={{color:C.gold,fontWeight:700,fontSize:15}}>{CONFIG.SCHOOL_NAME}</span>
        </div>
        <h1 style={{color:"#fff",fontWeight:900,margin:0,fontSize:mode==="student"?22:28}}>
          {mode==="student" ? "חתימת תלמיד על אישור יציאה" : "מערכת אישורי יציאה לטיול"}
        </h1>
        <p style={{color:"rgba(255,255,255,0.5)",marginTop:6,fontSize:14}}>
          {CONFIG.TRIP_NAME} • {CONFIG.TRIP_DESTINATION} • {CONFIG.TRIP_DATES}
        </p>
      </div>

      <div style={{maxWidth:660,margin:"0 auto"}}>
        <div style={{background:"#fff",borderRadius:24,padding:"36px 32px",
          boxShadow:"0 24px 80px rgba(0,0,0,0.4)"}}>

          {mode==="home" && (
            <div style={{textAlign:"center"}}>
              <p style={{color:C.muted,fontSize:16,marginBottom:36,lineHeight:1.7}}>
                ברוך/ה הבא/ה למערכת החתימות הדיגיטלית.<br/>
                ההורה מתחיל/ה את התהליך — לאחריו התלמיד/ה יחתום/תחתום<br/>
                דרך קישור שיישלח למייל הארגוני.
              </p>
              <button onClick={()=>setMode("parent")} style={{
                ...S.btnNavy, padding:"20px 44px", borderRadius:16, fontSize:18,
                display:"inline-flex", flexDirection:"column", alignItems:"center", gap:6,
              }}>
                <span style={{fontSize:32}}>👨‍👩‍👧</span>
                <span>אני הורה — להתחיל</span>
                <span style={{fontSize:12,fontWeight:400,opacity:0.65}}>חתימה על אישור יציאה לטיול</span>
              </button>
              <p style={{color:"#C0C0C0",fontSize:13,marginTop:28}}>
                תלמיד/ה? פתח/י את הקישור שנשלח לכתובת המייל הארגונית שלך
              </p>
            </div>
          )}

          {mode==="parent"  && <ParentFlow />}
          {mode==="student" && <StudentFlow token={token} />}
        </div>
        <p style={{textAlign:"center",color:"rgba(255,255,255,0.2)",fontSize:11,marginTop:14}}>
          🔒 הנתונים מאוחסנים בצורה מאובטחת ב-Google Sheets של בית הספר
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
